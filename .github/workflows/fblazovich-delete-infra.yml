name: Delete Exoscale Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Blazovich_Fabian/Abgabe_2_260603

    env:
      TF_VAR_exoscale_key: ${{ secrets.EXOSCALE_API_KEY }}
      TF_VAR_exoscale_secret: ${{ secrets.EXOSCALE_API_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Download OpenTofu state
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: ./Blazovich_Fabian

      - name: Initialize OpenTofu
        run: tofu init

      - name: Validate OpenTofu configuration
        run: tofu validate

      - name: Destroy OpenTofu infrastructure
        run: tofu destroy -auto-approve