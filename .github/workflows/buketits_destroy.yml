name: "Buketits Destroy Infrastructure"

on: workflow_dispatch
jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    env:
        TF_VAR_exoscale_api_key: ${{ secrets.EXOSCALE_API_KEY }}
        TF_VAR_exoscale_api_secret: ${{ secrets.EXOSCALE_API_SECRET }}

        TF_WORKING_DIR: ./Buketits_David/Abgabe_2_Exoscale
        TF_STATE_PATH: ./Buketits_David/Abgabe_2_Exoscale/terraform.tfstate
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy
        run: terraform plan -destroy

      - name: Terraform Destroy
        run: terraform destroy -auto-approve