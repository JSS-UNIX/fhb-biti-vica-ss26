# Öffentlicher HTTP-Server für die VM-Info-Anwendung.
server {
    listen 80;
    server_name ${fqdn};

    # Leitet alle Anfragen an den lokalen Python-Webserver weiter.
    location / {
        proxy_pass http://127.0.0.1:8080;

        # Übergibt wichtige Header an die Python-Anwendung.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}