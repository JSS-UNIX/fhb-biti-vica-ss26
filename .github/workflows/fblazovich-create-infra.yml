name: Create Exoscale Infrastructure

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Blazovich_Fabian/Abgabe_2_260603

    env:
      TF_VAR_exoscale_key: ${{ secrets.EXOSCALE_API_KEY }}
      TF_VAR_exoscale_secret: ${{ secrets.EXOSCALE_API_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Initialize OpenTofu
        run: tofu init

      - name: Validate OpenTofu configuration
        run: tofu validate 

      - name: Plan OpenTofu
        run: tofu plan -state=terraform-2.tfstate
        
      - name: OpenTofu Apply
        run: tofu apply -auto-approve

 # Speichert den  OpenTofu-State als GitHub Cache.
      # Dieser State wird später vom Destroy-Workflow benötigt.
      - name: Upload OpenTofu state
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: ./Blazovich_Fabian/Abgabe_2_260603/terraform-2.tfstate