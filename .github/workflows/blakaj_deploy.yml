name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      zone:
        description: "Exoscale zone"
        required: false
        default: "at-vie-1"
      instance_type:
        description: "Instance type"
        required: false
        default: "standard.micro"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.0"

      - name: Download Terraform state
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: tfstate
          path: Edison_Blakaj/Abgabe_2_260517/terraform/

      - name: Init
        working-directory: Edison_Blakaj/Abgabe_2_260517/terraform
        env:
          EXOSCALE_API_KEY:    ${{ secrets.EXOSCALE_API_KEY }}
          EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}
        run: tofu init

      - name: Plan
        working-directory: Edison_Blakaj/Abgabe_2_260517/terraform
        env:
          EXOSCALE_API_KEY:    ${{ secrets.EXOSCALE_API_KEY }}
          EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}
        run: |
          tofu plan \
            -var="zone=${{ github.event.inputs.zone }}" \
            -var="instance_type=${{ github.event.inputs.instance_type }}" \
            -out=tfplan

      - name: Apply
        working-directory: Edison_Blakaj/Abgabe_2_260517/terraform
        env:
          EXOSCALE_API_KEY:    ${{ secrets.EXOSCALE_API_KEY }}
          EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}
        run: tofu apply -auto-approve tfplan

      - name: Show outputs
        working-directory: Edison_Blakaj/Abgabe_2_260517/terraform
        env:
          EXOSCALE_API_KEY:    ${{ secrets.EXOSCALE_API_KEY }}
          EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}
        run: tofu output

      - name: Upload Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: Edison_Blakaj/Abgabe_2_260517/terraform/terraform.tfstate
          overwrite: true
