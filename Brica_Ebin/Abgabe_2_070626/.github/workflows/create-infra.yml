# Workflow zum automatischen Erstellen der Exoscale Infrastruktur

name: Create Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      # Repository auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # OpenTofu installieren
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      # OpenTofu initialisieren
      - name: Init
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform
        run: tofu init

      # Infrastruktur erstellen
      - name: Apply
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform
        env:
          TF_VAR_exoscale_key: ${{ secrets.EXOSCALE_API_KEY }}
          TF_VAR_exoscale_secret: ${{ secrets.EXOSCALE_API_SECRET }}
        run: tofu apply -auto-approve

      # IP und Endpunkte anzeigen
      - name: Show Output
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform
        run: tofu output

      # Terraform State speichern, damit Destroy später funktioniert
      - name: Commit Terraform State
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Brica_Ebin/Abgabe_2_070626/terraform/terraform.tfstate
          git commit -m "update terraform state" || echo "No state changes to commit"
          git push