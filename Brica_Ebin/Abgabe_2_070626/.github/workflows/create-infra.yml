# Workflow zum automatischen Erstellen der Exoscale Infrastruktur

name: Create Infrastructure


# Workflow wird manuell in GitHub gestartet
on:
  workflow_dispatch:


jobs:

  create:

    runs-on: ubuntu-latest


    steps:

      # Repository herunterladen
      - name: Checkout Repository
        uses: actions/checkout@v4


      # OpenTofu installieren
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1


      # OpenTofu initialisieren
      - name: Init
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform
        run: tofu init


      # Infrastruktur erstellen
      - name: Apply
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform

        env:
          TF_VAR_exoscale_key: ${{ secrets.EXOSCALE_API_KEY }}
          TF_VAR_exoscale_secret: ${{ secrets.EXOSCALE_API_SECRET }}

        run: tofu apply -auto-approve


      # IP und URLs anzeigen
      - name: Show Output
        working-directory: Brica_Ebin/Abgabe_2_070626/terraform
        run: tofu output