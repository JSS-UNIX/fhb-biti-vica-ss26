#cloud-config
package_update: true

packages:
  - python3
  - util-linux
  - lsb-release

write_files:
  - path: /opt/vm-info-server.py
    permissions: '0755'
    content: |
      from http.server import BaseHTTPRequestHander, HTTPServer
      import subprocess
      import json
      import socket

      def run(cmd):
        try:
          return subprocess.check_output(cmd, shell=True, text=True).strip()
          except Exception as e:
            return str(e)
          
      def get_info():
        return {
          "hostname": socket.gethostname(),
          "os": run("lsb_release -a 2>/dev/null"),
          "kernel": run("uname -a"),
          "ip_addresses": run("hostname -I"),
          "memory": run("free -h"),
          "cpu": run("lscpu"),
          "storage": run("lsblk"),
          "filesystem": run("df -hT"),
          "hypervisor": run("systemd-detect-virt || true")
          "uptime": run("uptime -p")
        }
     class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
          data = json.dumps(get_info(), indent=2)
          self.send_response(200)
          self.send_header("Content-Type", "application/json")
          self.end_headers()
          self.wfile.write(data.encode())

      HTTPServer(("0.0.0.0", 80), Handler).serve_forever()

  - path: /etc/systemd/system/vm.info.service
  permissions: '0644'
  content: |
  [Unit]
  Description=VM Info HTTP Endpoint
  After=network.target

  [Service]
  ExecStart=/usr/bin/python3 /opt/vm-info-server.py
  Restart=always

  [Install]
  WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable vm.info.service
  - systemctl start vm.info.service  
    