#cloud-config

# CloudInit führt die komplette Betriebssystem-Konfiguration automatisch aus
runcmd:

  # Paketlisten aktualisieren
  - apt-get update -y

  # Apache und curl installieren
  - apt-get install -y apache2 curl

  # Apache aktivieren und starten
  - systemctl enable apache2
  - systemctl start apache2

  # VM Informationen sammeln und HTML/JSON Dateien erstellen
  - |
    PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 || hostname -I | awk '{print $1}')
    KERNEL=$(uname -r)
    MEMORY=$(free -h | grep Mem | awk '{print $2}')
    STORAGE=$(df -h / | tail -1 | awk '{print $2}')
    FILESYSTEM=$(df -T / | tail -1 | awk '{print $2}')
    HYPERVISOR=$(systemd-detect-virt)

    cat > /var/www/html/index.html <<EOF
    <html>
    <head>
        <title>Exoscale VM Informationen</title>
    </head>
    <body>
        <h1>Virtualisierung Abgabe 2</h1>
        <h2>Technische Informationen der VM</h2>

        <p><b>Public IP:</b> $PUBLIC_IP</p>
        <p><b>Kernel:</b> $KERNEL</p>
        <p><b>Memory:</b> $MEMORY</p>
        <p><b>Storage:</b> $STORAGE</p>
        <p><b>Filesystem:</b> $FILESYSTEM</p>
        <p><b>Hypervisor:</b> $HYPERVISOR</p>
    </body>
    </html>
EOF

    cat > /var/www/html/api <<EOF
{
  "public_ip": "$PUBLIC_IP",
  "kernel": "$KERNEL",
  "memory": "$MEMORY",
  "storage": "$STORAGE",
  "filesystem": "$FILESYSTEM",
  "hypervisor": "$HYPERVISOR"
}
EOF

  # Apache nochmal sicher neu starten
  - systemctl restart apache2