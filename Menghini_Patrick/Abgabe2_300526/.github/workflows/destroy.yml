name: "2. Exoscale Infrastruktur Loeschen"
on:
  workflow_dispatch: # Workflow ■ber manuellen Knopfdruck

permissions:
  contents: write

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest

    steps:
      # 1. Repository klonen (lðdt die gesicherte terraform.tfstate mit)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 3. Terraform initialisieren
      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: ./terraform

      # 4. L—schen aller Ressourcen bei Exoscale
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./terraform
        env:
          TF_VAR_exoscale_key: ${{ secrets.EXOSCALE_KEY }}
          TF_VAR_exoscale_secret: ${{ secrets.EXOSCALE_SECRET }}

      # 5. Veraltete terraform.tfstate aus dem Repo l—schen
      - name: Remove State File from Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f ./terraform/terraform.tfstate || echo "Keine State Datei zum L—schen"
          git commit -m "State-Update: Infrastruktur gel—scht [skip ci]" || echo "Keine ánderungen"
          git push
